<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Aurelia — Booking (Print)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600;700&family=Marcellus&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* ---- print: one screen per page, sized to the uniform 3060px frames ---- */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { background: #0b1422; }
    @media print {
      @page { size: 1500px 3080px; margin: 0; }
      #exp-home, #exp-results, #exp-detail, #exp-checkout, #exp-confirm { break-before: page; }
      #exp-home { break-before: auto; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- data (plain script) -->
  <script src="data.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- babel components, in dependency order -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="results.jsx"></script>
  <script type="text/babel" src="detail.jsx"></script>
  <script type="text/babel" src="checkout.jsx"></script>
  <script type="text/babel" src="confirmation.jsx"></script>
  <script type="text/babel" src="export-app.jsx"></script>

  <!-- auto-print once all 5 frames are mounted and fonts are ready -->
  <script>
    (function () {
      function framesReady() {
        return document.getElementById("exp-home") && document.getElementById("exp-confirm");
      }
      var printed = false;
      function doPrint() {
        if (printed) return; printed = true;
        var fontsP = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
        fontsP.then(function () { setTimeout(function () { window.print(); }, 600); });
      }
      var iv = setInterval(function () {
        if (framesReady()) { clearInterval(iv); doPrint(); }
      }, 200);
      setTimeout(function () { clearInterval(iv); if (framesReady()) doPrint(); }, 15000);
    })();
  </script>
</body>
</html>
